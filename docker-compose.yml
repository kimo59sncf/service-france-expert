version: "3.8"

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-5000}
      - DATABASE_URL=postgresql://postgres:password@db:5432/servicefrance
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "4173:4173"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: servicefrance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
